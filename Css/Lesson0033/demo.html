<!DOCTYPE html>
<!-- Đây là file HTML demo cho bài CSS: "Tạo hình nền động" -->
<html>
<head>
    <!-- Liên kết đến file CSS -->
    <link rel="stylesheet" type="text/css" href="Lesson0033.css">
    <!-- Thiết lập tiêu đề của trang web -->
    <title>Tạo hình nền động</title>
</head>
<body>
    <!-- Tạo một div để chứa hình nền động -->
    <div class="hinh-nen-dong">
        <!-- Nội dung của div này sẽ được áp dụng hiệu ứng hình nền động -->
        <h1>Hình nền động</h1>
        <p>Đây là một ví dụ về hình nền động sử dụng CSS.</p>
    </div>
    <!-- Tạo một div khác để chứa nội dung khác -->
    <div class="noi-dung-khac">
        <!-- Nội dung của div này sẽ không bị ảnh hưởng bởi hiệu ứng hình nền động -->
        <h2>Nội dung khác</h2>
        <p>Đây là nội dung khác không bị ảnh hưởng bởi hiệu ứng hình nền động.</p>
    </div>
</body>
</html>
