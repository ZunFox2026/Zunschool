<!DOCTYPE html>
<!-- Định nghĩa loại tài liệu HTML5 -->
<html lang="vi">
<!-- Thể hiện ngôn ngữ của tài liệu là tiếng Việt -->
<head>
    <!-- Phần đầu của tài liệu, chứa thông tin về tài liệu -->
    <meta charset="UTF-8">
    <!-- Định nghĩa bảng mã ký tự cho tài liệu -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Định nghĩa cách hiển thị trên các thiết bị di động -->
    <title>Tạo Hình Nền</title>
    <!-- Tiêu đề của trang web -->
    <link rel="stylesheet" href="Lesson0009.css">
    <!-- Liên kết đến file CSS -->
</head>
<body>
    <!-- Phần nội dung của tài liệu -->
    <header>
        <!-- Phần đầu của trang web -->
        <h1>Tạo Hình Nền</h1>
        <!-- Tiêu đề chính của trang web -->
    </header>
    <main>
        <!-- Phần nội dung chính của trang web -->
        <section class="background-image">
            <!-- Phần chứa hình nền -->
            <h2>Hình Nền</h2>
            <!-- Tiêu đề của phần chứa hình nền -->
            <p>Hình nền được tạo bằng cách sử dụng CSS.</p>
            <!-- Nội dung của phần chứa hình nền -->
        </section>
        <section class="background-color">
            <!-- Phần chứa màu nền -->
            <h2>Màu Nền</h2>
            <!-- Tiêu đề của phần chứa màu nền -->
            <p>Màu nền được tạo bằng cách sử dụng CSS.</p>
            <!-- Nội dung của phần chứa màu nền -->
        </section>
        <section class="background-gradient">
            <!-- Phần chứa màu nền渐 biến -->
            <h2>Màu Nền Gradients</h2>
            <!-- Tiêu đề của phần chứa màu nền渐 biến -->
            <p>Màu nền渐 biến được tạo bằng cách sử dụng CSS.</p>
            <!-- Nội dung của phần chứa màu nền渐 biến -->
        </section>
    </main>
    <footer>
        <!-- Phần cuối của trang web -->
        <p>&copy; 2023 Tạo Hình Nền</p>
        <!-- Thông tin bản quyền -->
    </footer>
</body>
</html>
