<!DOCTYPE html>
<!-- Đây là file HTML demo cho bài học về Shadow -->
<html lang="vi">
<head>
    <!-- Liên kết đến file CSS -->
    <link rel="stylesheet" href="Lesson0019.css">
    <!-- Thiết lập tiêu đề trang web -->
    <title>Tìm hiểu về Shadow</title>
</head>
<body>
    <!-- Tạo một hộp để áp dụng hiệu ứng shadow -->
    <div class="box">
        <!-- Nội dung trong hộp -->
        <h2>Hiệu ứng Shadow</h2>
        <p>Đây là một hộp có hiệu ứng shadow.</p>
    </div>
    
    <!-- Tạo một hộp khác để áp dụng hiệu ứng shadow khác -->
    <div class="box2">
        <!-- Nội dung trong hộp -->
        <h2>Hiệu ứng Shadow khác</h2>
        <p>Đây là một hộp có hiệu ứng shadow khác.</p>
    </div>
    
    <!-- Tạo một hình ảnh để áp dụng hiệu ứng shadow -->
    <img src="https://via.placeholder.com/200x200" alt="Hình ảnh demo" class="image">
    
    <!-- Tạo một đoạn văn để áp dụng hiệu ứng shadow cho text -->
    <p class="text-shadow">Đây là một đoạn văn có hiệu ứng shadow cho text.</p>
</body>
</html>
