<!DOCTYPE html>
<html>
<head>
    <!-- Phần này chứa thông tin về trang web, bao gồm cả CSS -->
    <title>Tạo hiệu ứng bóng đổ</title>
    <style>
        /* Phần này chứa mã CSS để tạo hiệu ứng bóng đổ */
        .box {
            /* Tạo một hộp với màu nền và kích thước */
            width: 200px;
            height: 200px;
            background-color: #ff69b4;
            margin: 50px auto;
            /* Tạo hiệu ứng bóng đổ */
            box-shadow: 10px 10px 5px #ccc;
            border-radius: 10px;
        }
        
        .box-2 {
            /* Tạo một hộp khác với màu nền và kích thước khác */
            width: 200px;
            height: 200px;
            background-color: #33cc33;
            margin: 50px auto;
            /* Tạo hiệu ứng bóng đổ khác */
            box-shadow: -10px -10px 5px #ccc;
            border-radius: 10px;
        }
        
        .box-3 {
            /* Tạo một hộp khác với màu nền và kích thước khác */
            width: 200px;
            height: 200px;
            background-color: #6666ff;
            margin: 50px auto;
            /* Tạo hiệu ứng bóng đổ khác */
            box-shadow: 0px 0px 10px #ccc;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <!-- Phần này chứa nội dung trang web -->
    <!-- Tạo 3 hộp với hiệu ứng bóng đổ khác nhau -->
    <div class="box"></div>
    <div class="box-2"></div>
    <div class="box-3"></div>
</body>
</html>
