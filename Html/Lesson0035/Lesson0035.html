<!DOCTYPE html>
<!-- Đây là khai báo loại tài liệu HTML5 -->
<html>
<!-- Phần head chứa thông tin về tài liệu -->
<head>
    <!-- Thẻ title hiển thị tiêu đề trang web trên trình duyệt -->
    <title>Tạo hiệu ứng thị giác</title>
    <!-- Thẻ style chứa mã CSS cho trang web -->
    <style>
        /* Phần CSS này sẽ tạo hiệu ứng thị giác */
        body {
            /* Thiết lập màu nền cho trang web */
            background-color: #f2f2f2;
        }
        
        /* Tạo hiệu ứng cho phần nội dung */
        .noi-dung {
            /* Thiết lập màu nền và kích thước cho phần nội dung */
            background-color: #ffffff;
            width: 80%;
            margin: 40px auto;
            padding: 20px;
            border: 1px solid #dddddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        /* Tạo hiệu ứng cho phần tiêu đề */
        .tieu-de {
            /* Thiết lập màu và kích thước cho phần tiêu đề */
            color: #00698f;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        /* Tạo hiệu ứng cho phần chữ */
        .chu {
            /* Thiết lập màu và kích thước cho phần chữ */
            color: #666666;
            font-size: 16px;
            margin-bottom: 20px;
        }
        
        /* Tạo hiệu ứng cho phần hình ảnh */
        .hinh-anh {
            /* Thiết lập kích thước và margin cho phần hình ảnh */
            width: 100%;
            height: 200px;
            margin-bottom: 20px;
            border-radius: 10px;
        }
        
        /* Tạo hiệu ứng hover cho phần hình ảnh */
        .hinh-anh:hover {
            /* Thiết lập hiệu ứng hover cho phần hình ảnh */
            transform: scale(1.1);
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<!-- Phần body chứa nội dung của trang web -->
<body>
    <!-- Tạo phần nội dung -->
    <div class="noi-dung">
        <!-- Tạo phần tiêu đề -->
        <div class="tieu-de">Tạo hiệu ứng thị giác</div>
        <!-- Tạo phần chữ -->
        <div class="chu">Bài học này sẽ hướng dẫn bạn tạo hiệu ứng thị giác bằng CSS.</div>
        <!-- Tạo phần hình ảnh -->
        <div class="hinh-anh" style="background-color: #cccccc;"></div>
        <!-- Tạo phần chữ -->
        <div class="chu">Hiệu ứng thị giác là một phần quan trọng trong thiết kế web.</div>
    </div>
</body>
</html>
