<!DOCTYPE html>
<!-- Đây là khai báo loại tài liệu HTML5 -->
<html>
<!-- Đây là phần bắt đầu của tài liệu HTML -->
<head>
    <!-- Phần head chứa thông tin về trang web -->
    <title>Trang web về du lịch</title>
    <!-- Tiêu đề của trang web -->
    <style>
        /* CSS cho trang web */
        body {
            /* Thiết lập màu nền cho trang web */
            background-color: #f0f0f0;
        }
        .header {
            /* Thiết lập màu nền và chiều cao cho phần header */
            background-color: #007bff;
            color: #ffffff;
            padding: 20px;
            text-align: center;
        }
        .content {
            /* Thiết lập màu nền và chiều rộng cho phần nội dung */
            background-color: #ffffff;
            width: 80%;
            margin: 20px auto;
            padding: 20px;
            border: 1px solid #dddddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .footer {
            /* Thiết lập màu nền và chiều cao cho phần footer */
            background-color: #007bff;
            color: #ffffff;
            padding: 10px;
            text-align: center;
            clear: both;
        }
    </style>
</head>
<body>
    <!-- Phần body chứa nội dung của trang web -->
    <div class="header">
        <!-- Phần header chứa tiêu đề trang web -->
        <h1>Trang web về du lịch</h1>
    </div>
    <div class="content">
        <!-- Phần nội dung chứa thông tin về du lịch -->
        <h2>Khám phá thế giới</h2>
        <p>Trang web này sẽ giúp bạn khám phá các địa điểm du lịch hấp dẫn trên thế giới.</p>
        <img src="https://via.placeholder.com/500x300" alt="Hình ảnh du lịch">
        <p>Từ những thành phố sầm uất đến những bãi biển hoang sơ, chúng tôi sẽ mang đến cho bạn những trải nghiệm du lịch tuyệt vời.</p>
    </div>
    <div class="footer">
        <!-- Phần footer chứa thông tin về trang web -->
        <p>&copy; 2024 Trang web về du lịch</p>
    </div>
</body>
</html>
