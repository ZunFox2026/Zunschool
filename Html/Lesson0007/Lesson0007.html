<!DOCTYPE html>
<!-- Đây là khai báo loại tài liệu HTML5 -->
<html>
<!-- Phần thân của tài liệu HTML -->
<head>
    <!-- Phần đầu của tài liệu HTML, chứa thông tin về trang web -->
    <title>Đăng nhập</title>
    <!-- Tiêu đề của trang web, xuất hiện trên tab trình duyệt -->
    <style>
        /* CSS viết trong thẻ style */
        body {
            /* Thiết lập màu nền và font cho toàn bộ trang web */
            background-color: #f2f2f2;
            font-family: Arial, sans-serif;
        }
        .form-dang-nhap {
            /* Thiết lập màu nền, kích thước và vị trí cho form đăng nhập */
            background-color: #fff;
            width: 300px;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .form-dang-nhap h2 {
            /* Thiết lập màu sắc và kích thước cho tiêu đề form đăng nhập */
            color: #337ab7;
            font-size: 24px;
            margin-bottom: 20px;
        }
        .form-dang-nhap input {
            /* Thiết lập màu sắc, kích thước và khoảng cách cho các trường input */
            width: 100%;
            height: 40px;
            margin-bottom: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .form-dang-nhap button {
            /* Thiết lập màu sắc, kích thước và khoảng cách cho nút đăng nhập */
            width: 100%;
            height: 40px;
            background-color: #337ab7;
            color: #fff;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .form-dang-nhap button:hover {
            /* Thiết lập hiệu ứng khi di chuột qua nút đăng nhập */
            background-color: #23527c;
        }
    </style>
</head>
<body>
    <!-- Phần nội dung của trang web -->
    <div class="form-dang-nhap">
        <!-- Form đăng nhập -->
        <h2>Đăng nhập</h2>
        <!-- Tiêu đề form đăng nhập -->
        <form>
            <!-- Form đăng nhập -->
            <input type="text" placeholder="Tên đăng nhập" />
            <!-- Trường input cho tên đăng nhập -->
            <input type="password" placeholder="Mật khẩu" />
            <!-- Trường input cho mật khẩu -->
            <button>Đăng nhập</button>
            <!-- Nút đăng nhập -->
        </form>
    </div>
</body>
</html>
