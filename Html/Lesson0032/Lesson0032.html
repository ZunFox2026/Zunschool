<!DOCTYPE html>
<html>
<head>
    <!-- Phần đầu của trang web, chứa thông tin về trang -->
    <title>Tạo hiệu ứng loading</title>
    <style>
        /* Phần CSS để tạo kiểu cho trang web */
        body {
            /* Cài đặt màu nền và font cho trang web */
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        
        .loading {
            /* Tạo hiệu ứng loading */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 10px solid #3498db;
            border-top-color: transparent;
            animation: loading 1s linear infinite;
        }
        
        @keyframes loading {
            /* Tạo animation cho hiệu ứng loading */
            0% {
                transform: translate(-50%, -50%) rotate(0deg);
            }
            100% {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }
        
        .text {
            /* Cài đặt kiểu cho văn bản */
            position: absolute;
            top: 60%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: #3498db;
        }
    </style>
</head>
<body>
    <!-- Phần thân của trang web, chứa nội dung -->
    <div class="loading"></div>
    <div class="text">Đang tải...</div>
    <!-- Hiệu ứng loading sẽ được hiển thị tại đây -->
</body>
</html>
